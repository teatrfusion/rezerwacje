<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Rezerwacje Teatr Fusion</title>
<style>
    body {
        margin: 0;
        font-family: Open Sans, sans-serif;
        background-color: #ffffff;
    }

    .top {
        background-color: #000;
        height: 350px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .logo-container {
        width: 350px;
        height: 350px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .logo-container img {
        max-width: 100%;
        max-height: 100%;
    }

    .content {
        background-color: #ffffff;
        padding: 40px 20px;
        text-align: center;
    }

    h1 {
        margin-bottom: 40px;
        font-size: 36px;
    }

    .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #e67e0d;
        color: white;
        text-decoration: none;
        font-size: 36px;
        padding: 20px;
        margin: 20px auto;
        width: 300px;
        border-radius: 12px;
        transition: 0.2s;
    }

    .btn:hover {
        background-color: #cf6f0c;
    }

    .icon {
        margin-right: 15px;
        display: flex;
        gap: 4px;
    }

    /* Ikony */

    .week-icon div {
        width: 6px;
        height: 30px;
        background: white;
    }

    .month-icon {
        display: grid;
        grid-template-columns: repeat(4, 6px);
        gap: 4px;
    }

    .month-icon div {
        width: 6px;
        height: 6px;
        background: white;
    }

    .list-icon {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .list-icon div {
        width: 30px;
        height: 4px;
        background: white;
    }
</style>
</head>
<body>

<div class="top">
    <div class="logo-container">
        <img src="logo.png" alt="Logo">
    </div>
</div>

<div class="content">
    <h1>Widok Kalendarza</h1>

<a href="tydzien.html" class="btn">
    <img src="t.png" alt="Tydzień" style="width:50px; height:50px; margin-right:25px;">
    Tydzień
</a>

<a href="miesiac.html" class="btn">
    <img src="m.png" alt="Miesiąc" style="width:50px; height:50px; margin-right:25px;">
    Miesiąc
</a>

<a href="lista.html" class="btn">
    <img src="l.png" alt="Lista" style="width:50px; height:50px; margin-right:25px;">
    Lista
</a>
</div>

</body>
</html>
